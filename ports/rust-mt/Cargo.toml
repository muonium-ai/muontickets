[package]
name = "mt-port"
version = "0.1.0"
edition = "2021"
description = "MuonTickets non-Python CLI port (Rust scaffold)"
license = "MIT"
build = "build.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1.0"
regex = "1.10"
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
rusqlite = { version = "0.32", features = ["bundled"] }
which = "7.0"
