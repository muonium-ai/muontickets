name: combined-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to publish (example: v0.9.0)
        required: false

permissions:
  contents: write
  id-token: write

jobs:
  build-rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Rust native release artifacts
        working-directory: ports/rust-mt
        shell: bash
        run: |
          chmod +x scripts/release.sh
          ./scripts/release.sh --targets native

      - name: Smoke test Rust binary via conformance fixture
        shell: bash
        run: |
          BIN="$(find ports/rust-mt/dist -maxdepth 2 -type f \( -name mt -o -name mt.exe \) | head -n1)"
          if [[ -z "$BIN" ]]; then
            echo "built rust binary not found in dist" >&2
            exit 1
          fi
          MT_CMD="$BIN" python3 tests/conformance/runner.py --fixture tests/conformance/fixtures/reporting_graph_pick.json

      - name: Upload Rust release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: combined-rust-dist-${{ matrix.os }}
          path: ports/rust-mt/dist/*
          if-no-files-found: error

  build-zig:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Zig native release artifacts
        working-directory: ports/zig-mt
        shell: bash
        run: ./scripts/release.sh --targets native --optimize ReleaseSafe

      - name: Smoke test Zig binary via conformance fixture
        shell: bash
        run: |
          BIN="$(find ports/zig-mt/dist -maxdepth 2 -type f \( -name mt-zig -o -name mt-zig.exe \) | head -n1)"
          if [[ -z "$BIN" ]]; then
            echo "built zig binary not found in dist" >&2
            exit 1
          fi
          MT_CMD="$BIN" python3 tests/conformance/runner.py --fixture tests/conformance/fixtures/reporting_graph_pick.json

      - name: Upload Zig release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: combined-zig-dist-${{ matrix.os }}
          path: ports/zig-mt/dist/*
          if-no-files-found: error

  publish:
    needs: [build-rust, build-zig]
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ github.event.inputs.release_tag }}"
          fi
          if [[ -z "$TAG" ]]; then
            echo "release_tag is required for workflow_dispatch" >&2
            exit 2
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download Rust release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: combined-rust-dist-*
          path: dist
          merge-multiple: true

      - name: Download Zig release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: combined-zig-dist-*
          path: dist
          merge-multiple: true

      - name: Rebuild combined SHA256SUMS
        shell: bash
        run: |
          rm -f dist/SHA256SUMS dist/SHA256SUMS.sig dist/SHA256SUMS.pem
          shopt -s nullglob
          for artifact in dist/*.tar.gz dist/*.zip; do
            shasum -a 256 "$artifact" >> dist/SHA256SUMS
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Keyless sign SHA256SUMS
        shell: bash
        run: |
          cosign sign-blob --yes \
            --output-signature dist/SHA256SUMS.sig \
            --output-certificate dist/SHA256SUMS.pem \
            dist/SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
