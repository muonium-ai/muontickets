name: c-release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish a GitHub Release from this run
        required: false
        default: false
        type: boolean
      release_tag:
        description: Existing tag to publish (example: c-v0.1.0)
        required: false
  push:
    tags:
      - "c-v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-cross:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build c-mt cross-platform release artifacts
        working-directory: ports/c-mt
        shell: bash
        run: |
          chmod +x scripts/release.sh
          ./scripts/release.sh --targets aarch64-macos,x86_64-macos,x86_64-linux,aarch64-linux,x86_64-windows

      - name: Verify checksums
        working-directory: ports/c-mt
        shell: bash
        run: |
          chmod +x scripts/verify-release.sh
          ./scripts/verify-release.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: c-cross-dist
          path: ports/c-mt/dist/*
          if-no-files-found: error

  publish:
    needs: build-cross
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/c-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    steps:
      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ github.event.inputs.release_tag }}"
          fi
          if [[ -z "$TAG" ]]; then
            echo "release_tag is required for workflow_dispatch when publish=true" >&2
            exit 2
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: c-cross-dist
          path: dist
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Keyless sign SHA256SUMS
        shell: bash
        run: |
          cosign sign-blob --yes \
            --output-signature dist/SHA256SUMS.sig \
            --output-certificate dist/SHA256SUMS.pem \
            dist/SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
