name: zig-release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish a GitHub Release from this run
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "zig-v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.1

      - name: Build native release artifacts
        working-directory: ports/zig-mt
        shell: bash
        run: ./scripts/release.sh --targets native --optimize ReleaseSafe

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zig-native-dist-${{ matrix.os }}
          path: ports/zig-mt/dist/*
          if-no-files-found: error

  publish:
    needs: build-native
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/zig-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: zig-native-dist-*
          path: dist
          merge-multiple: true

      - name: Rebuild combined SHA256SUMS
        run: |
          rm -f dist/SHA256SUMS
          shopt -s nullglob
          for artifact in dist/*.tar.gz dist/*.zip; do
            shasum -a 256 "$artifact" >> dist/SHA256SUMS
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Keyless sign SHA256SUMS
        run: |
          cosign sign-blob --yes \
            --output-signature dist/SHA256SUMS.sig \
            --output-certificate dist/SHA256SUMS.pem \
            dist/SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
