name: rust-release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish a GitHub Release from this run
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "rust-v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build native release artifacts
        working-directory: ports/rust-mt
        shell: bash
        run: |
          chmod +x scripts/release.sh
          ./scripts/release.sh --targets native

      - name: Smoke test installed binary via conformance fixture
        shell: bash
        run: |
          BIN="$(find ports/rust-mt/dist -maxdepth 2 -type f \( -name mt -o -name mt.exe \) | head -n1)"
          if [[ -z "$BIN" ]]; then
            echo "built binary not found in dist" >&2
            exit 1
          fi
          BIN="$(cd "$(dirname "$BIN")" && pwd)/$(basename "$BIN")"
          MT_CMD="$BIN" python tests/conformance/runner.py --fixture tests/conformance/fixtures/reporting_graph_pick.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-native-dist-${{ matrix.os }}
          path: ports/rust-mt/dist/*
          if-no-files-found: error

  publish:
    needs: build-native
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/rust-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rust-native-dist-*
          path: dist
          merge-multiple: true

      - name: Rebuild combined SHA256SUMS
        shell: bash
        run: |
          rm -f dist/SHA256SUMS
          shopt -s nullglob
          for artifact in dist/*.tar.gz dist/*.zip; do
            shasum -a 256 "$artifact" >> dist/SHA256SUMS
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Keyless sign SHA256SUMS
        shell: bash
        run: |
          cosign sign-blob --yes \
            --output-signature dist/SHA256SUMS.sig \
            --output-certificate dist/SHA256SUMS.pem \
            dist/SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
